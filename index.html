<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Win The Weekend — Cook County Cooks</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    width: 100%;
    background: #0a0a0a;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .stage {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.2s ease-in-out;
    pointer-events: none;
  }
  .slide.active {
    opacity: 1;
    pointer-events: auto;
    z-index: 2;
  }
  .slide iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #0a0a0a;
  }
  /* Fallback only shown if iframe truly fails */
  .fallback {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
    background: linear-gradient(135deg, #0d1321, #06080f);
    color: #fff;
  }
  .slide.show-fallback .fallback { display: flex; }
  .slide.show-fallback iframe { display: none; }
  .fallback h1 {
    font-size: clamp(40px, 6vw, 72px);
    letter-spacing: 2px;
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .fallback p {
    max-width: 560px;
    color: #9aa5bd;
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .fallback a {
    background: #00f0ff;
    color: #001218;
    padding: 14px 26px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-size: 13px;
  }
  /* Thin progress bar at the very top */
  .progress {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    width: 0%;
    background: linear-gradient(90deg, #00f0ff, #ff3860);
    z-index: 100;
    transition: width 0.1s linear;
    box-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
  }
  /* Corner badge so the audience knows which deck is on screen */
  .label {
    position: fixed;
    top: 14px;
    right: 18px;
    z-index: 101;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.55);
    padding: 6px 12px;
    border-radius: 4px;
    backdrop-filter: blur(6px);
  }
  /* Loading veil shown while the next iframe boots */
  .loader {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    color: #888;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: opacity 0.5s ease;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div class="loader" id="loader">Loading…</div>
<div class="progress" id="progress"></div>
<div class="label" id="label">Big South</div>
<div class="stage">
  <section class="slide active" data-name="Big South">
    <iframe
      src="https://blufoxmobile.github.io/Win-The-Weekend---Big-South/"
      title="Win The Weekend — Big South"
      allow="autoplay; fullscreen"
      referrerpolicy="no-referrer-when-downgrade"></iframe>
    <div class="fallback">
      <h1>Big South</h1>
      <p>Couldn't load the Big South deck.</p>
      <a href="https://blufoxmobile.github.io/Win-The-Weekend---Big-South/" target="_blank" rel="noopener">Open Big South →</a>
    </div>
  </section>
  <section class="slide" data-name="Chicago">
    <iframe
      data-src="https://blufoxmobile.github.io/Win-The-Weekend---Chicago/"
      title="Win The Weekend — Chicago"
      allow="autoplay; fullscreen"
      referrerpolicy="no-referrer-when-downgrade"></iframe>
    <div class="fallback">
      <h1>Chicago</h1>
      <p>Couldn't load the Chicago deck.</p>
      <a href="https://blufoxmobile.github.io/Win-The-Weekend---Chicago/" target="_blank" rel="noopener">Open Chicago →</a>
    </div>
  </section>
</div>
<script>
  // Each child deck rotates its own internal slides every 7 seconds.
  // Big South has 16 slides (~112s), Chicago has 18 slides (~126s).
  // Give each one 2 minutes on screen so the inner rotation actually plays.
  const SLIDE_DURATION = 120000;

  const slides = document.querySelectorAll('.slide');
  const progress = document.getElementById('progress');
  const label = document.getElementById('label');
  const loader = document.getElementById('loader');
  let currentIndex = 0;
  let elapsed = 0;

  // Hide the loader once the first iframe is ready
  const firstFrame = slides[0].querySelector('iframe');
  firstFrame.addEventListener('load', () => loader.classList.add('hidden'));
  // Safety net: hide loader after 6s no matter what
  setTimeout(() => loader.classList.add('hidden'), 6000);

  function showSlide(index) {
    slides.forEach((s, i) => s.classList.toggle('active', i === index));
    currentIndex = index;
    elapsed = 0;
    progress.style.width = '0%';
    const name = slides[index].getAttribute('data-name');
    if (name) label.textContent = name;

    // Lazy-load the iframe the first time it's shown
    const iframe = slides[index].querySelector('iframe');
    if (iframe && !iframe.src && iframe.dataset.src) {
      iframe.src = iframe.dataset.src;
    }
  }

  // Tick every 100ms: update progress bar, advance deck on timeout
  setInterval(() => {
    elapsed += 100;
    const pct = Math.min((elapsed / SLIDE_DURATION) * 100, 100);
    progress.style.width = pct + '%';
    if (elapsed >= SLIDE_DURATION) {
      showSlide((currentIndex + 1) % slides.length);
    }
  }, 100);

  // Iframe load failure detection — show fallback if a frame doesn't load in 12s
  slides.forEach(slide => {
    const iframe = slide.querySelector('iframe');
    let loaded = false;
    iframe.addEventListener('load', () => {
      loaded = true;
      try {
        const doc = iframe.contentDocument;
        if (doc && doc.body && doc.body.childElementCount === 0) {
          slide.classList.add('show-fallback');
        }
      } catch (_) {
        // Cross-origin denial = iframe loaded fine, no action needed
      }
    });
    setTimeout(() => {
      if (!loaded && (iframe.src || iframe.dataset.src)) {
        // Only flag a failure if we actually tried to load it
        if (iframe.src) slide.classList.add('show-fallback');
      }
    }, 12000);
  });

  // Click anywhere to skip to the next deck
  document.addEventListener('click', () => {
    showSlide((currentIndex + 1) % slides.length);
  });
</script>
</body>
</html>
